spring.application.name=ms-payments

# MySQL Database Configuration with fallback defaults
spring.datasource.url=jdbc:mysql://mysql:3306/WZZY_LIBRARY_PAYMENTS
spring.datasource.username=root
spring.datasource.password=wzzyroot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Datadog Monitoring Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Datadog APM Tracing (Environment passed via Docker)
# DD_AGENT_HOST, DD_AGENT_PORT, DD_TRACE_ENABLED already set via docker-compose
# Services automatically trace HTTP requests, database queries, and method calls

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/WZZY_LIBRARY_PAYMENTS
spring.datasource.username=root
spring.datasource.password=wzzyroot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
